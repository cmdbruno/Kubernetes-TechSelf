apiVersion: batch/v1
kind: CronJob
metadata:
  name: techsafe-backup
spec:
  schedule: "*/1 * * * *" # executa a cada 1 minuto (para teste)
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: backup
              image: busybox
              command:
                - /bin/sh
                - -c
                - echo "Backup executado em $(date)" >> /backup/backup.txt
              volumeMounts:
                - name: backup-volume
                  mountPath: /backup
          restartPolicy: OnFailure
          volumes:
            - name: backup-volume
              emptyDir: {}
